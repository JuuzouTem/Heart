<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>But Nobody Came</title>
  <!-- Undertale piksel fontu -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Giriş Ekranı (Tarayıcı engellerini aşmak için) */
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 1s ease;
    }

    #start-btn {
      background: none;
      border: 4px solid #fff;
      color: #fff;
      padding: 20px 40px;
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
    }

    #start-btn:hover {
      background-color: #fff;
      color: #000;
      box-shadow: 0 0 15px #fff;
    }

    /* Ana Sahne */
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* Atmosferik kırmızı karanlık efekti */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(30, 0, 0, 0.45) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Kalp Konteyneri */
    #heart-container {
      position: absolute;
      width: 180px;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(0);
      opacity: 0;
      /* Ekrana doğru süzülerek gelme efekti */
      transition: transform 2.2s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 2.2s ease;
      z-index: 10;
    }

    /* Kalp Parlama Efekti */
    .heart-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 25px rgba(255, 30, 30, 0.9));
    }

    /* Sol ve Sağ Kalp Parçaları */
    .heart-half {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Alt sivri uç (50px, 95px) etrafında dönecekler */
      transform-origin: 50px 95px;
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Kalp Atışı Animasyonu (Kırılmadan önce) */
    .pulse {
      animation: heartbeat 1.4s infinite;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.12); }
      28% { transform: scale(1); }
      42% { transform: scale(1.12); }
      70% { transform: scale(1); }
      100% { transform: scale(1); }
    }

    /* Çatlama Efekti (Üst 1/4 oranında esneyerek açılır) */
    .broken .heart-half.left {
      transform: rotate(-5deg);
    }

    .broken .heart-half.right {
      transform: rotate(5deg);
    }

    /* Kırılma Anı Ekran Efektleri */
    .flash-active {
      animation: flash-anim 0.3s ease-out forwards;
    }

    .shake-active {
      animation: shake-anim 0.4s ease-in-out;
    }

    @keyframes flash-anim {
      0% { background-color: #ffffff; }
      100% { background-color: #000000; }
    }

    @keyframes shake-anim {
      0%, 100% { transform: translate(0, 0); }
      10%, 90% { transform: translate(-8px, 4px); }
      20%, 80% { transform: translate(8px, -6px); }
      30%, 70% { transform: translate(-6px, -4px); }
      40%, 60% { transform: translate(6px, 6px); }
      50% { transform: translate(-4px, 2px); }
    }

    /* Undertale Mesaj Kutusu */
    #dialogue-box {
      position: absolute;
      width: 85%;
      max-width: 650px;
      height: 150px;
      border: 6px solid #fff;
      background-color: #000;
      padding: 30px;
      box-sizing: border-box;
      opacity: 0;
      transition: opacity 1.5s ease;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      z-index: 5;
    }

    #dialogue-box.show {
      opacity: 1;
    }

    .dialogue-text {
      font-size: 20px;
      line-height: 1.8;
      color: #fff;
      letter-spacing: 2px;
      text-align: left;
      white-space: pre-wrap;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Ses Dosyaları -->
  <audio id="bgm" src="dialtone.mp3" loop></audio>
  <audio id="shatter-audio" src="break.mp3"></audio>

  <!-- Giriş Ekranı -->
  <div id="start-overlay">
    <button id="start-btn">* START</button>
  </div>

  <!-- Sahne -->
  <div id="stage" class="hidden">
    <div class="vignette"></div>

    <!-- Kalp Alanı -->
    <div id="heart-container">
      <div class="heart-wrapper" id="heart-wrapper">
        
        <!-- Sol Yarım (Ortadaki çatlak hattı dâhil) -->
        <svg class="heart-half left" viewBox="0 0 100 100">
          <path d="M50,15 C35,0 0,0 0,35 C0,65 35,85 50,95 L50,35 L48,30 L53,24 L47,18 L50,12 Z" fill="#ff1f1f" />
        </svg>
        
        <!-- Sağ Yarım (Sol yarım ile mükemmel birleşen simetrisi) -->
        <svg class="heart-half right" viewBox="0 0 100 100">
          <path d="M50,15 C65,0 100,0 100,35 C100,65 65,85 50,95 L50,35 L48,30 L53,24 L47,18 L50,12 Z" fill="#ff1f1f" />
        </svg>
        
      </div>
    </div>

    <!-- Mesaj Kutusu -->
    <div id="dialogue-box">
      <div class="dialogue-text" id="dialogue-text"></div>
    </div>
  </div>

  <script>
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const stage = document.getElementById('stage');
    const bgm = document.getElementById('bgm');
    const shatterAudio = document.getElementById('shatter-audio');
    const heartContainer = document.getElementById('heart-container');
    const dialogueBox = document.getElementById('dialogue-box');
    const dialogueText = document.getElementById('dialogue-text');

    startBtn.addEventListener('click', () => {
      // Arka plan müziğini başlat
      bgm.play().catch(e => console.log("Müzik başlatılamadı:", e));
      
      // Giriş ekranını gizle
      startOverlay.style.opacity = '0';
      setTimeout(() => {
        startOverlay.classList.add('hidden');
        stage.classList.remove('hidden');
        
        // 1. ADIM: Kalp uzaktan süzülerek ekrana gelir
        setTimeout(() => {
          heartContainer.style.transform = 'scale(1)';
          heartContainer.style.opacity = '1';
        }, 100);

        // 2. ADIM: Kalp ulaştığında düzenli atış animasyonu başlar
        setTimeout(() => {
          heartContainer.classList.add('pulse');
        }, 2300);

        // 3. ADIM: Kırılma gerçekleşir (Üstten çatlama)
        setTimeout(() => {
          heartContainer.classList.remove('pulse');
          heartContainer.classList.add('broken');
          
          // Kırılma sesini çalmayı dene, başarısız olursa yapay retro ses üret
          triggerShatterSound();
          
          // Görsel sarsıntı ve parlama efekti
          stage.classList.add('flash-active', 'shake-active');
          setTimeout(() => {
            stage.classList.remove('flash-active', 'shake-active');
          }, 400);

        }, 5200);

        // 4. ADIM: Kalp çatlak haliyle geriye doğru süzülerek yok olur
        setTimeout(() => {
          heartContainer.style.transition = 'transform 2s cubic-bezier(0.8, 0.1, 0.9, 0.2), opacity 1.8s ease';
          heartContainer.style.transform = 'scale(0)';
          heartContainer.style.opacity = '0';
        }, 7000);

        // 5. ADIM: Mesaj kutusu belirir ve metin yazılmaya başlar
        setTimeout(() => {
          dialogueBox.classList.add('show');
          
          setTimeout(() => {
            typeWriter("* But nobody came.", 0);
          }, 800);

        }, 9000);

      }, 1000); // <-- '1s' yazımı '1000' olarak düzeltildi (Syntax hatası giderildi)
    });

    // Harf harf yazdırma (Typewriter) fonksiyonu
    function typeWriter(text, i) {
      if (i < text.length) {
        dialogueText.innerHTML += text.charAt(i);
        // Boşluk karakterlerinde ses çıkmasını engeller
        if (text.charAt(i) !== ' ') {
          playTypeSound();
        }
        setTimeout(() => {
          typeWriter(text, i + 1);
        }, 110); // Klasik Undertale yazı akış hızı
      }
    }

    // break.mp3 dosyasını çalmayı dener, yoksa otomatik sentezleyiciyi devreye sokar
    function triggerShatterSound() {
      shatterAudio.play().catch(e => {
        console.warn("break.mp3 bulunamadı veya yüklenemedi. Yapay retro ses devreye giriyor.", e);
        playSynthShatter();
      });
    }

    // Web Audio API ile yapay 8-bit kırılma sesi (break.mp3 404 uyarısı verse dahi çalışır)
    function playSynthShatter() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = ctx.sampleRate * 0.35; 
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(1800, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(9000, ctx.currentTime + 0.3);
        
        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        
        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(ctx.destination);
        noise.start();
      } catch (e) {
        console.log("Ses sentezlenemedi:", e);
      }
    }

    // Orijinal Undertale diyalog ses sentezleyicisi (Web Audio API)
    function playTypeSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        // Karakteristik retro ses için üçgen dalga (triangle)
        osc.type = 'triangle'; 
        // Undertale'ın standart metin sesi frekansı (~115Hz)
        osc.frequency.setValueAtTime(115, ctx.currentTime); 
        
        gainNode.gain.setValueAtTime(0.12, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      } catch(e) {}
    }
  </script>
</body>
</html>
