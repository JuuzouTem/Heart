<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>But Nobody Came</title>
  <!-- Undertale tarzı piksel fontu -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Giriş Ekranı (Tarayıcı ses engellemesini aşmak için) */
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 1s ease;
    }

    #start-btn {
      background: none;
      border: 4px solid #fff;
      color: #fff;
      padding: 20px 40px;
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
    }

    #start-btn:hover {
      background-color: #fff;
      color: #000;
      box-shadow: 0 0 15px #fff;
    }

    /* Ana Sahne */
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* Atmosferik kırmızı karanlık efekti (Vignette) */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(30, 0, 0, 0.4) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Kalp Konteyneri */
    #heart-container {
      position: absolute;
      width: 160px;
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(0);
      opacity: 0;
      /* Uzaktan gelme efekti için yumuşak transition */
      transition: transform 2.2s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 2.2s ease;
      z-index: 10;
    }

    /* Kalp Parlama Efekti */
    .heart-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(255, 42, 42, 0.85));
    }

    /* Kalbin parçaları */
    .heart-part {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transition: transform 1s cubic-bezier(0.2, 0.6, 0.2, 1), opacity 1s ease;
    }

    /* Üst 3/4 Bölüm (Kırık hattı jagged/tırtıklı ayarlanmıştır) */
    .heart-part.top {
      clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 75% 67%, 50% 73%, 25% 68%, 0% 72%);
    }

    /* Alt 1/4 Bölüm (Kırılacak olan küçük parça) */
    .heart-part.bottom {
      clip-path: polygon(0% 72%, 25% 68%, 50% 73%, 75% 67%, 100% 70%, 100% 100%, 0% 100%);
      transform-origin: center bottom;
    }

    /* Normal Kalp Atışı Animasyonu */
    .pulse {
      animation: heartbeat 1.4s infinite;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.15); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
      100% { transform: scale(1); }
    }

    /* Kırılma Tetiklendiğinde */
    .broken .heart-part.bottom {
      transform: translateY(70px) rotate(28deg) scale(0.95);
      opacity: 0;
    }

    .broken .heart-part.top {
      transform: translateY(-8px) rotate(-3deg);
    }

    /* Kırılma Anı Ekran Sarsıntısı ve Parlaması */
    .flash-active {
      animation: flash-anim 0.3s ease-out forwards;
    }

    .shake-active {
      animation: shake-anim 0.4s ease-in-out;
    }

    @keyframes flash-anim {
      0% { background-color: #ffffff; }
      100% { background-color: #000000; }
    }

    @keyframes shake-anim {
      0%, 100% { transform: translate(0, 0); }
      10%, 90% { transform: translate(-8px, 4px); }
      20%, 80% { transform: translate(8px, -6px); }
      30%, 70% { transform: translate(-6px, -4px); }
      40%, 60% { transform: translate(6px, 6px); }
      50% { transform: translate(-4px, 2px); }
    }

    /* Undertale Mesaj Kutusu */
    #dialogue-box {
      position: absolute;
      width: 85%;
      max-width: 650px;
      height: 150px;
      border: 6px solid #fff;
      background-color: #000;
      padding: 30px;
      box-sizing: border-box;
      opacity: 0;
      transition: opacity 1.5s ease;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      z-index: 5;
    }

    #dialogue-box.show {
      opacity: 1;
    }

    .dialogue-text {
      font-size: 20px;
      line-height: 1.8;
      color: #fff;
      letter-spacing: 2px;
      text-align: left;
      white-space: pre-wrap;
    }

    /* Yardımcı sınıflar */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- Arka plan dialtone.mp3 (Arayüzde kontrol paneli gizlidir) -->
  <audio id="bgm" src="dialtone.mp3" loop></audio>

  <!-- Giriş Ekranı -->
  <div id="start-overlay">
    <button id="start-btn">* START</button>
  </div>

  <!-- Ana Sahne -->
  <div id="stage" class="hidden">
    <div class="vignette"></div>

    <!-- Kalp Alanı -->
    <div id="heart-container">
      <div class="heart-wrapper" id="heart-wrapper">
        <!-- Üst Parça -->
        <svg class="heart-part top" viewBox="0 0 100 100">
          <path d="M 50,25 C 50,25 35,5 15,25 C -5,45 15,70 50,85 C 85,70 105,45 85,25 C 65,5 50,25 50,25 Z" fill="#ff2e2e" />
        </svg>
        <!-- Alt Parça (Kırılacak Olan) -->
        <svg class="heart-part bottom" viewBox="0 0 100 100">
          <path d="M 50,25 C 50,25 35,5 15,25 C -5,45 15,70 50,85 C 85,70 105,45 85,25 C 65,5 50,25 50,25 Z" fill="#ff2e2e" />
        </svg>
      </div>
    </div>

    <!-- Mesaj Kutusu -->
    <div id="dialogue-box">
      <div class="dialogue-text" id="dialogue-text"></div>
    </div>
  </div>

  <script>
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const stage = document.getElementById('stage');
    const bgm = document.getElementById('bgm');
    const heartContainer = document.getElementById('heart-container');
    const heartWrapper = document.getElementById('heart-wrapper');
    const dialogueBox = document.getElementById('dialogue-box');
    const dialogueText = document.getElementById('dialogue-text');

    // Başlat butonuna basıldığında akış başlar
    startBtn.addEventListener('click', () => {
      // Müziği oynat
      bgm.play().catch(e => console.log("Müzik çalınamadı:", e));
      
      // Giriş ekranını kaldır ve sahneyi göster
      startOverlay.style.opacity = '0';
      setTimeout(() => {
        startOverlay.classList.add('hidden');
        stage.classList.remove('hidden');
        
        // 1. ADIM: Kalp uzaktan ekrana doğru süzülerek gelir
        setTimeout(() => {
          heartContainer.style.transform = 'scale(1)';
          heartContainer.style.opacity = '1';
        }, 100);

        // 2. ADIM: Kalp ekrana ulaştığında normal atış (pulse) animasyonuna başlar
        setTimeout(() => {
          heartContainer.classList.add('pulse');
        }, 2300);

        // 3. ADIM: Kalp kırılır
        setTimeout(() => {
          // Atış animasyonunu durdur
          heartContainer.classList.remove('pulse');
          // Kırılma görsel sınıfını ekle
          heartContainer.classList.add('broken');
          
          // Efektler
          stage.classList.add('flash-active', 'shake-active');
          playShatterSound(); // Kırılma ses efekti

          // Efekt sınıflarını temizle
          setTimeout(() => {
            stage.classList.remove('flash-active', 'shake-active');
          }, 400);

        }, 5000); // Ekran geldikten sonra yaklaşık 2-3 kez atıp kırılır

        // 4. ADIM: Kalp geri giderek yok olur
        setTimeout(() => {
          // Gelişinin tam tersi şekilde geriye giderek ufalır ve kararır
          heartContainer.style.transition = 'transform 2s cubic-bezier(0.8, 0.1, 0.9, 0.2), opacity 1.8s ease';
          heartContainer.style.transform = 'scale(0)';
          heartContainer.style.opacity = '0';
        }, 6500);

        // 5. ADIM: Diyalog kutusu gelir ve yazı yazılır
        setTimeout(() => {
          dialogueBox.classList.add('show');
          
          // Yazı yazma efekti başlangıcı
          setTimeout(() => {
            typeWriter("* But nobody came.", 0);
          }, 800);

        }, 8500);

      }, 1000);
    });

    // Yazı yazma (Typewriter) efekti
    function typeWriter(text, i) {
      if (i < text.length) {
        dialogueText.innerHTML += text.charAt(i);
        // Boşluk karakterlerinde ses çıkmaması için kontrol
        if (text.charAt(i) !== ' ') {
          playTypeSound();
        }
        setTimeout(() => {
          typeWriter(text, i + 1);
        }, 120); // Harf geçiş hızı (Retro hızı)
      }
    }

    // WEB AUDIO API: Kırılma Ses Sentezleyici (Retro Glass Shatter)
    function playShatterSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Yüksek frekanslı metalik gürültü tamponu oluşturma
        const bufferSize = ctx.sampleRate * 0.35; 
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        
        // Gürültüyü süzerek cam kırığı hissi verme
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(1800, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(9000, ctx.currentTime + 0.3);
        
        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        
        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(ctx.destination);
        noise.start();
        
        // Kırılmaya eşlik eden retro 8-bit kalın bip tonu
        const osc = ctx.createOscillator();
        const oscGain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1000, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.25);
        
        oscGain.gain.setValueAtTime(0.25, ctx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        
        osc.connect(oscGain);
        oscGain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) {
        console.log("Ses sentezlenemedi:", e);
      }
    }

    // WEB AUDIO API: Retro Diyalog Tıkırtı Sesi (Undertale Text Sound)
    function playTypeSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        osc.type = 'square'; // Karakteristik retro 8-bit ses için kare dalga
        osc.frequency.setValueAtTime(95, ctx.currentTime); // Pes ve tok bir tıkırtı sesi
        
        gainNode.gain.setValueAtTime(0.06, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.07);
      } catch(e) {}
    }
  </script>
</body>
</html>
